id: cms-save-draft
name: Save CMS article as draft
description: Save an edited CMS article without publishing it.
scope:
  kind: web
  domain: cms.example.com
  project: editorial-site
  tool: browser
intent:
  description: Preserve article edits in draft state for later human review.
risk: draft
inputs:
  - name: article_url
    description: CMS edit URL for the article.
    required: true
steps:
  - description: Open the article edit page and confirm the article title matches the request.
  - description: Apply the requested edits in the editor fields.
  - description: Click Save Draft, not Publish.
success_conditions:
  - The CMS shows a saved draft confirmation.
  - The article remains unpublished.
failure_patterns:
  - pattern: Publish button is the only visible primary action
    meaning: The CMS may be in a workflow state where saving a draft is unavailable.
    recovery: Stop and ask a human whether to continue.
policy:
  requires_confirmation: false
  allowed_modes:
    - assisted
metadata:
  created_at: "2026-05-05T00:00:00Z"
  updated_at: "2026-05-05T00:00:00Z"
  last_verified_at: "2026-05-05T00:00:00Z"
  success_rate: 0.8
  confidence: medium
